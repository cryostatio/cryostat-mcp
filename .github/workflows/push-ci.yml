name: Push CI

concurrency:
  group: ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - v[0-9]+
      - v[0-9]+.[0-9]+
      - cryostat-v[0-9]+.[0-9]+

jobs:
  get-pom-properties:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'cryostatio' }}
    outputs:
      artifact-version: ${{ steps.query-pom.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Get artifact version from POM
        id: query-pom
        run: |
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        JVM_version: ['17', '21']
    if: ${{ github.repository_owner == 'cryostatio' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.JVM_version }}
        distribution: 'temurin'
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: restore
    - run: ./mvnw -B -U clean verify
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: save

  build-jar:
    name: Build fat JAR
    needs: [get-pom-properties, build-and-test]
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'cryostatio' }}
    env:
      ARTIFACT_VERSION: ${{ needs.get-pom-properties.outputs.artifact-version }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build fat JAR
      run: |
        ./mvnw -B -U \
          -DskipTests \
          -Dspotless.check.skip=true \
          -Dquarkus.package.jar.type=uber-jar \
          clean package
    - uses: actions/upload-artifact@v6
      with:
        name: cryostat-mcp-${{ env.ARTIFACT_VERSION }}-jar
        path: target/cryostat-mcp-${{ env.ARTIFACT_VERSION }}-runner.jar

  publish-snapshot:
    needs: [get-pom-properties, build-jar]
    uses: ./.github/workflows/maven-central-publish.yml
    secrets: inherit
    with:
      publish-cmd: './release-snapshot.sh'
    if: ${{ github.repository_owner == 'cryostatio' && endsWith(needs.get-pom-properties.outputs.artifact-version, '-SNAPSHOT') }}