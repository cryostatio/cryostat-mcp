name: CI build

concurrency:
  group: ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - v[0-9]+
      - v[0-9]+.[0-9]+
      - cryostat-v[0-9]+.[0-9]+
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
    branches:
      - main
      - v[0-9]+
      - v[0-9]+.[0-9]+
      - cryostat-v[0-9]+.[0-9]+

jobs:
  build-core-and-single:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        JVM_version: ['17', '21']
    if: ${{ github.repository_owner == 'cryostatio' }}
    steps:
    - name: Fail if PR and safe-to-test label NOT applied
      if: ${{ github.event_name == 'pull_request_target' && !contains(github.event.pull_request.labels.*.name, 'safe-to-test') }}
      run: exit 1
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
    - uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.JVM_version }}
        distribution: 'temurin'
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: restore
    - run: ./mvnw -B -U clean verify -pl cryostat-mcp-core,cryostat-mcp-single -am
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: save

  build-k8s-mux:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'cryostatio' }}
    steps:
    - name: Fail if PR and safe-to-test label NOT applied
      if: ${{ github.event_name == 'pull_request_target' && !contains(github.event.pull_request.labels.*.name, 'safe-to-test') }}
      run: exit 1
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: restore
    - run: ./mvnw -B -U clean verify -pl cryostat-mcp-k8s-mux -am
    - uses: skjolber/maven-cache-github-action@v1
      with:
        step: save

