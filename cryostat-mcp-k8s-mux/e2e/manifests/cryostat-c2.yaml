---
# Secret for Basic Authentication
apiVersion: v1
kind: Secret
metadata:
  name: cryostat-c2-basic-auth
  namespace: c2
type: Opaque
stringData:
  # Basic auth credentials: user:pass
  # This is a bcrypt hash of "pass"
  htpasswd: "user:$2y$05$xUMuOEzt/C83Cxfz99/OXug.IJlt4IcRXeeWp.gl4G6ZhKfc1x/Ja"
---
# Cryostat CR for c2 instance
apiVersion: operator.cryostat.io/v1beta2
kind: Cryostat
metadata:
  name: cryostat-c2
  namespace: c2
spec:
  # Target namespaces to monitor
  targetNamespaces:
    - apps2
  
  # Enable TLS for secure communication
  enableCertManager: true
  
  # Authorization configuration - Basic auth for e2e testing
  authorizationOptions:
    basicAuth:
      secretName: cryostat-c2-basic-auth
      filename: htpasswd
  
