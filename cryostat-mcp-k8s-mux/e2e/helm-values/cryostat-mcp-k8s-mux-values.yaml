# cryostat-mcp-k8s-mux Helm values for e2e testing on OpenShift/CRC
# Uses local image built from source
# Override default namespace
namespace: cryostat-mcp
createNamespace: false

# Authentication configuration
# Authorization header for connecting to Cryostat instances
# This will be set dynamically by the installation script using 'oc whoami --show-token'
auth:
  authorizationHeader: ""  # Set by installation script

image:
  repository: default-route-openshift-image-registry.apps-crc.testing/cryostat-mcp/cryostat-mcp-k8s-mux
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

# OpenShift Route configuration
route:
  enabled: true
  host: ""  # Auto-generated by OpenShift
  tls:
    enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Service account with cluster-wide permissions to discover Cryostat instances
serviceAccount:
  create: true
  name: cryostat-mcp-k8s-mux

# RBAC for discovering Cryostat CRs across all namespaces
rbac:
  create: true
  clusterRole: true

# Environment variables for configuration
env:
  logLevel: "INFO"
  k8sLogLevel: "INFO"
  # Trust all TLS certificates for e2e testing with self-signed certs
  trustAllTls: "true"

