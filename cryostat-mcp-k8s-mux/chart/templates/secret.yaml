{{- if and .Values.auth.authorizationHeader (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cryostat-k8s-multi-mcp.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cryostat-k8s-multi-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.authorizationHeader | b64enc | quote }}
{{- end }}