# Service exposes both MCP (SSE) and REST interfaces:
# - MCP Server: /mcp (Streamble HTTP)
# - MCP Server: /mcp/sse (Server-Sent Events)
# - REST API: /api
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cryostat-k8s-multi-mcp.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cryostat-k8s-multi-mcp.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cryostat-k8s-multi-mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http