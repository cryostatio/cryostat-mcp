---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-mcp

resources:
  - ../namespace.yaml
  - ../rbac.yaml
  - ../deployment.yaml
  - ../service.yaml

images:
  - name: quay.io/cryostat/k8s-multi-mcp
    newName: quay.io/andrewazores/cryostat-k8s-multi-mcp
    newTag: latest

patches:
  - target:
      kind: Namespace
    patch: |-
      - op: replace
        path: /metadata/name
        value: k8s-mcp