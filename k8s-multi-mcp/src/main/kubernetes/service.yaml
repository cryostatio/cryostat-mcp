---
# Service for k8s-multi-mcp
# Exposes the MCP server for client connections
apiVersion: v1
kind: Service
metadata:
  name: k8s-multi-mcp
  namespace: cryostat-mcp-system
  labels:
    app: k8s-multi-mcp
    app.kubernetes.io/name: k8s-multi-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: cryostat-mcp
  annotations:
    # Optional: Add annotations for cloud provider load balancers
    # Example for AWS:
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

    # Example for GCP:
    # cloud.google.com/load-balancer-type: "Internal"

    # Example for Azure:
    # service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  # Service type - change based on your requirements:
  # - ClusterIP: Internal cluster access only (default, most secure)
  # - NodePort: Exposes on each node's IP at a static port
  # - LoadBalancer: Exposes externally using cloud provider's load balancer
  type: ClusterIP

  # Selector to match pods
  selector:
    app: k8s-multi-mcp

  # Ports configuration
  ports:
    - name: http
      protocol: TCP
      port: 8080        # Service port (what clients connect to)
      targetPort: http  # Container port (named port from deployment)
      # nodePort: 30080 # Uncomment if using NodePort type (range: 30000-32767)

  # Session affinity - use ClientIP if you need sticky sessions
  # sessionAffinity: ClientIP
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800  # 3 hours