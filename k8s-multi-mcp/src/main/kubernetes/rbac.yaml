---
# ServiceAccount for k8s-multi-mcp
# Used ONLY for Kubernetes API access (listing CRs and Services)
# NOT used for Cryostat access - client credentials are forwarded instead
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-multi-mcp
  namespace: k8s-mcp
  labels:
    app: k8s-multi-mcp
    app.kubernetes.io/name: k8s-multi-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: cryostat-mcp
---
# ClusterRole for k8s-multi-mcp
# Defines permissions needed to discover Cryostat CRs and Services
# Follows principle of least privilege - only read access to necessary resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-multi-mcp
  labels:
    app: k8s-multi-mcp
    app.kubernetes.io/name: k8s-multi-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: cryostat-mcp
rules:
  # Permission to discover Cryostat Custom Resources
  # Required for: Finding Cryostat instances and their target namespaces
  - apiGroups:
      - operator.cryostat.io
    resources:
      - cryostats
    verbs:
      - get      # Get individual CR details
      - list     # List all CRs in the cluster
      - watch    # Watch for CR changes in real-time

  # Permission to discover Services
  # Required for: Determining Cryostat service URLs for connection
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get      # Get individual service details
      - list     # List services in namespaces

  # Optional: Permission to read Secrets (if needed for TLS certificates)
  # Uncomment if your Cryostat instances use custom TLS certificates
  # - apiGroups:
  #     - ""
  #   resources:
  #     - secrets
  #   verbs:
  #     - get
  #     - list
---
# ClusterRoleBinding for k8s-multi-mcp
# Binds the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-multi-mcp
  labels:
    app: k8s-multi-mcp
    app.kubernetes.io/name: k8s-multi-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: cryostat-mcp
roleRef:
  # Reference to the ClusterRole defined above
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-multi-mcp
subjects:
  # Reference to the ServiceAccount
  - kind: ServiceAccount
    name: k8s-multi-mcp
    namespace: k8s-mcp
---
