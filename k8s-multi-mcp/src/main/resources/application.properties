quarkus.mcp.server.transport=sse
quarkus.http.port=8080

quarkus.kubernetes-client.trust-certs=true

# REST Client Configuration (template for dynamic clients)
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024

# K8s Multi-MCP Tool Configuration
# Tools that require namespace parameter (directed operations)
k8s-multi-mcp.namespace-required-tools=listTargetEventTemplates,getTargetEventTemplate,listTargetActiveRecordings,listTargetArchivedRecordings,startTargetRecording,scrapeTargetMetrics,getTargetReport,executeQuery,getHealth,getDiscoveryTree,listTargets,getAuditTarget,getAuditTargetLineage

# Tools that accept optional namespace parameter (non-directed operations with aggregation)
k8s-multi-mcp.namespace-optional-tools=scrapeMetrics