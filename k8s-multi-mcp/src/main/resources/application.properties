quarkus.application.name=cryostat-k8s-multi-mcp

# Console Logging Configuration
quarkus.log.console.enabled=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.http.port=8080

# CORS configuration for SSE MCP endpoints
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type

quarkus.kubernetes-client.trust-certs=true

# Container Image Configuration
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.registry=quay.io
quarkus.container-image.group=cryostat
quarkus.container-image.name=cryostat-k8s-multi-mcp
quarkus.container-image.tag=latest

# Authorization header for Cryostat instances
# Set via environment variable: K8S_MULTI_MCP_AUTHORIZATION_HEADER
k8s.multi.mcp.authorization.header=${K8S_MULTI_MCP_AUTHORIZATION_HEADER:}

# Cryostat GraphQL endpoint path
cryostat.graphql.path=/api/v4/graphql

# Static Cryostat client configuration (unused in k8s-multi-mcp)
# Note: k8s-multi-mcp creates dynamic clients per request with authorization from ConfigProperty
quarkus.rest-client.cryostat.url=http://unused
quarkus.smallrye-graphql-client.cryostat.url=http://unused
quarkus.smallrye-graphql-client.cryostat.header.Authorization=${K8S_MULTI_MCP_AUTHORIZATION_HEADER:}

# REST Client Configuration (template for dynamic clients)
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024

# SmallRye Health Configuration
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready
quarkus.smallrye-health.startup-path=/q/health/started