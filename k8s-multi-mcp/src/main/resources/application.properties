quarkus.application.name=cryostat-k8s-multi-mcp
quarkus.http.port=8080

quarkus.kubernetes-client.trust-certs=true

# Container Image Configuration
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.group=cryostat
quarkus.container-image.name=cryostat-k8s-multi-mcp
quarkus.container-image.registry=quay.io
quarkus.container-image.tag=latest

# Disable static Cryostat client configuration (we use dynamic clients)
# Note: These are placeholder values since k8s-multi-mcp creates dynamic clients per request
cryostat.auth.value=Bearer unused-placeholder-token
quarkus.rest-client.cryostat.url=http://unused
quarkus.smallrye-graphql-client.cryostat.url=http://unused
quarkus.smallrye-graphql-client.cryostat.header.Authorization=Bearer unused-placeholder-token

# REST Client Configuration (template for dynamic clients)
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024

# K8s Multi-MCP Tool Configuration
# Tools that require namespace parameter (directed operations)
k8s-multi-mcp.namespace-required-tools=listTargetEventTemplates,getTargetEventTemplate,listTargetActiveRecordings,listTargetArchivedRecordings,startTargetRecording,scrapeTargetMetrics,getTargetReport,executeQuery,getHealth,getDiscoveryTree,listTargets,getAuditTarget,getAuditTargetLineage

# Tools that accept optional namespace parameter (non-directed operations with aggregation)
k8s-multi-mcp.namespace-optional-tools=scrapeMetrics