apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cryostat-k8s-multi-mcp.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cryostat-k8s-multi-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cryostat-k8s-multi-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "cryostat-k8s-multi-mcp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cryostat-k8s-multi-mcp.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ include "cryostat-k8s-multi-mcp.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # HTTP server port
            - name: QUARKUS_HTTP_PORT
              value: "8080"

            # Logging configuration
            - name: QUARKUS_LOG_CONSOLE_ENABLED
              value: "true"
            - name: QUARKUS_LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}

            # k8s-multi-mcp specific logging
            - name: QUARKUS_LOG_CATEGORY__IO_CRYOSTAT_MCP_K8S__LEVEL
              value: {{ .Values.env.k8sLogLevel | quote }}

            # Kubernetes client configuration
            - name: QUARKUS_KUBERNETES_CLIENT_TRUST_CERTS
              value: {{ .Values.env.trustCerts | quote }}

            # TLS/SSL configuration for REST and GraphQL clients
            - name: QUARKUS_TLS_TRUST_ALL
              value: {{ .Values.env.trustAllTls | quote }}

            # Static GraphQL client configuration (placeholder - actual auth is dynamic)
            - name: QUARKUS_SMALLRYE_GRAPHQL_CLIENT_CRYOSTAT_HEADER_AUTHORIZATION
              value: "Bearer placeholder-token-replaced-at-runtime"

            # Authorization header for MCP client authentication
            - name: K8S_MULTI_MCP_AUTHORIZATION_HEADER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cryostat-k8s-multi-mcp.secretName" . }}
                  key: {{ .Values.auth.secretKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}