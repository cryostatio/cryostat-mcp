apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cryostat-k8s-multi-mcp.fullname" . }}
  labels:
    {{- include "cryostat-k8s-multi-mcp.labels" . | nindent 4 }}
rules:
  # Permission to discover Cryostat Services
  # Required for: Finding Cryostat instances by their Service labels
  # Cryostat instances (both Operator-deployed and Helm-deployed) are identified
  # by Services with labels: app.kubernetes.io/part-of=cryostat and
  # app.kubernetes.io/component=cryostat
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get      # Get individual service details
      - list     # List services in namespaces
      - watch    # Watch for service changes in real-time