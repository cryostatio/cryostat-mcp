# Cryostat Helm values for c2 instance
# Monitors apps2 namespace

core:
  image:
    repository: quay.io/cryostat/cryostat
    tag: 4.2.0-snapshot
    pullPolicy: Always

  discovery:
    # Enable discovery of targets in specific namespaces
    namespaces:
      - apps2

  service:
    type: NodePort
    httpPort: 8181
    nodePort: 30081

  ingress:
    enabled: false

  route:
    enabled: false

  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi

authentication:
  # Use oauth2-proxy for authentication with basic auth
  basicAuth:
    enabled: true
    secretName: cryostat-c2-htpasswd
    filename: htpasswd
  cookieSecretName: cryostat-c2-cookie-secret
  oauth2Proxy:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 200m
        memory: 100Mi

storage:
  enabled: true
  size: 1Gi

database:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

grafana:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 80Mi
    limits:
      cpu: 200m
      memory: 200Mi

reports:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi