quarkus.package.jar.type=uber-jar

# Cryostat connection configuration
quarkus.rest-client.cryostat.url=${CRYOSTAT_URL:http://localhost:8181}

# Authorization configuration
# Both REST and GraphQL clients use static authorization from this configuration
cryostat.auth.value=${CRYOSTAT_AUTH_VALUE:}

# GraphQL client configuration
quarkus.smallrye-graphql-client.cryostat.url=${CRYOSTAT_URL:http://localhost:8181}/api/v4/graphql
quarkus.smallrye-graphql-client.cryostat.header.Authorization=${cryostat.auth.value}

# Logging - redirect to file for stdio transport (Quarkus 3.x format)
quarkus.log.console.enabled=false
quarkus.log.file.enabled=true
quarkus.log.file.path=cryostat-mcp-single.log
quarkus.log.level=INFO
quarkus.log.category."io.cryostat.mcp.single".level=DEBUG
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG

# Enable REST client request/response logging
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024